# Tuned postgresql.conf for mempalace-db running inside a 6 GiB cgroup.
#
# This file is mounted onto /etc/postgresql/postgresql.conf inside the container
# and referenced via `-c config_file=` in docker-compose.yml's command. Sized for
# the familiar host (15 GiB total RAM, shared with llama-server + palace-daemon +
# familiar-api + kg-extract). See docker-compose.yml's `mem_limit` block for the
# host-budget reasoning.

# --- Connections ----------------------------------------------------------

listen_addresses = '*'
# Observed peak: ~16 backends (palace-daemon + kg-extract + familiar-api +
# dev clients). 32 gives 2x headroom over peak; the prior 200 was inherited
# from default postgres tuning and never matched real concurrency.
# Worst-case work_mem now caps at 32 MB × 32 = 1 GiB (was 6.4 GiB at 200),
# which is what unlocks raising shared_buffers below. See familiar#61.
max_connections = 32

# --- Memory (the load-bearing changes) ------------------------------------

# Pre-2026-05-28: 4GB (OOMed under the old 3g cgroup); raised to 2GB when the
# cgroup moved to 6g; raised again to 3GB on 2026-05-28 once max_connections
# dropped 200→32 freed ~5 GiB of worst-case work_mem reservation. 3GB is 50%
# of the 6g cgroup — postgres's documented sweet spot for dedicated DB hosts.
# Working-set math: shared_buffers (3g) + wal_buffers (64 MB) + per-backend
# work (~50 MB × ~16 active = 0.8 GiB) + maintenance_work_mem (512 MB) + AGE
# sort buffers ≈ 4.4-4.8 GiB, still ~20% under the 6g ceiling.
shared_buffers = 3GB

# Pre-2026-05-28: 12GB. The familiar host only has 15 GiB total and ~3 GiB
# of it goes to llama-server, ~1 GiB to palace-daemon, plus the OS — there
# was never 12 GiB of free page cache available to postgres. 6GB is the
# realistic ceiling for what the kernel can keep hot for us, and matches
# the cgroup envelope.
effective_cache_size = 6GB

# Per-backend sort/hash memory. With max_connections=32, worst case is
# 32 MB × 32 = 1 GiB — comfortably inside the 6g cap. Keeps room for the
# rare large sort/hash without dropping back to disk spills.
work_mem = 32MB

maintenance_work_mem = 512MB

# --- WAL ------------------------------------------------------------------

max_wal_size = 4GB
min_wal_size = 256MB
wal_buffers = 64MB
synchronous_commit = off
wal_writer_delay = 200ms

# --- Parallelism ----------------------------------------------------------

max_worker_processes = 16
max_parallel_workers = 12
max_parallel_workers_per_gather = 4
max_parallel_maintenance_workers = 4

# --- Shared memory --------------------------------------------------------

dynamic_shared_memory_type = posix

# --- Locale / formatting --------------------------------------------------

log_timezone = 'Etc/UTC'
datestyle = 'iso, mdy'
timezone = 'Etc/UTC'
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'
default_text_search_config = 'pg_catalog.english'
