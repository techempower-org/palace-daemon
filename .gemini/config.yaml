# Gemini Code Assist config for techempower-org/palace-daemon
# Docs: https://developers.google.com/gemini-code-assist/docs/customize-gemini-behavior-github
#
# Tuned for the daemon: production-shaped HTTP/MCP gateway, so reviews
# should focus on auth, request handling, concurrency, and error paths.

have_fun: false

code_review:
  disable: false
  comment_severity_threshold: MEDIUM
  max_review_comments: -1
  pull_request_opened:
    help: false
    summary: true
    code_review: true

ignore_patterns:
  - "*.lock"
  - "uv.lock"
  - "**/__pycache__/**"
  - "**/.venv/**"
  - "**/dist/**"
  - "**/*.egg-info/**"
  - "tests/data/**"
