services:
  palace-daemon:
    build: .
    # Per SECURITY.md: never run as root. The Dockerfile creates the
    # `palace` user as UID:GID 1000:1000; override here if your host user
    # owning the palace bind-mount uses a different UID. e.g.
    #   PALACE_UID=$(id -u) PALACE_GID=$(id -g) docker compose up
    user: "${PALACE_UID:-1000}:${PALACE_GID:-1000}"
    ports:
      - "${PALACE_PORT:-8085}:8085"
    volumes:
      # Mount your palace directory here. The daemon owns the palace;
      # do not run a second daemon or mempalace CLI against the same path
      # while this container is running.
      - ${PALACE_PATH:-~/.mempalace/palace}:/palace:rw
    environment:
      - PALACE_API_KEY=${PALACE_API_KEY:-}
      - PALACE_MAX_CONCURRENCY=${PALACE_MAX_CONCURRENCY:-4}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8085/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
